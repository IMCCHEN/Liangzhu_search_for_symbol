<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>器物检索 · 良渚刻绘符号检索平台</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<div class="wrap">
  <h1 class="section-title">器物检索</h1>
  <p class="sub">共 <span id="total">0</span> 件器物。可在左侧按条件筛选，或使用搜索框检索编号、考古学编号、器型、材质、备注。</p>

  <div class="searchbar">
    <input id="q" type="text" placeholder="搜索 器物编号 / 考古学编号 / 器型 / 材质 / 备注 …">
    <button class="btn" id="go">搜索</button>
    <button class="btn ghost" id="reset">重置</button>
  </div>

  <div class="search-layout">
    <aside class="filters" id="filters"></aside>
    <div>
      <div class="resbar">
        <div class="cnt">检索结果 <b id="cnt">0</b> 件</div>
        <div>
          <label style="font-size:13px;color:var(--ink-soft)">排序：
          <select id="sort" style="padding:6px;border:1px solid var(--line);border-radius:6px;font-family:inherit">
            <option value="id">编号</option>
            <option value="type">器型</option>
            <option value="site">出土地</option>
          </select></label>
        </div>
      </div>
      <div class="grid" id="grid"></div>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="assets/common.js"></script>
<script>
(function(){
  var D=window.LZ_DATA, items=D.qiwu;
  document.getElementById('total').textContent=items.length;
  var FACETS=[
    {key:'type',label:'器型'},
    {key:'site',label:'出土地'},
    {key:'inst',label:'现藏单位'},
    {key:'matcat',label:'材质'}
  ];
  var sel={}; FACETS.forEach(function(f){sel[f.key]={};});
  var fc=document.getElementById('filters');
  fc.innerHTML='<h3>筛选条件</h3>'+FACETS.map(function(f){
    var vals=LZ.facet(items,f.key);
    var lastWords = ['未注明','不明','未注明','未知'];
  vals.sort(function(a,b){
    var aLast = lastWords.includes(a.v);
    var bLast = lastWords.includes(b.v);
    if (aLast && !bLast) return 1;
    if (!aLast && bLast) return -1;
    return b.n - a.n;
  });
    return '<div class="fgroup"><div class="lbl">'+f.label+'</div><div class="chips" data-k="'+f.key+'">'+
      vals.map(function(x){return '<span class="chip" data-v="'+encodeURIComponent(x.v)+'">'+x.v+' <small style="opacity:.6">'+x.n+'</small></span>';}).join('')+
      '</div></div>';
  }).join('');

  // URL 预选（来自地理沙盘）
  var p=new URLSearchParams(location.search);
  if(p.get('site')){var sv=p.get('site');sel.site[sv]=1;}

  fc.querySelectorAll('.chips').forEach(function(box){
    var k=box.dataset.k;
    box.querySelectorAll('.chip').forEach(function(ch){
      var v=decodeURIComponent(ch.dataset.v);
      if(sel[k][v]) ch.classList.add('on');
      ch.addEventListener('click',function(){
        if(sel[k][v]){delete sel[k][v];ch.classList.remove('on');}
        else{sel[k][v]=1;ch.classList.add('on');}
        render();
      });
    });
  });

  var grid=document.getElementById('grid'), cnt=document.getElementById('cnt');
  function match(q){
    var txt=document.getElementById('q').value.trim().toLowerCase();
    for(var i=0;i<FACETS.length;i++){
      var k=FACETS[i].key, chosen=Object.keys(sel[k]);
      if(chosen.length && chosen.indexOf(q[k])<0) return false;
    }
    if(txt){
      var hay=[q.id,q.arch,q.type,q.material,q.note,q.inst,q.site].join(' ').toLowerCase();
      if(hay.indexOf(txt)<0) return false;
    }
    return true;
  }
  function render(){
    var sb=document.getElementById('sort').value;
    var res=items.filter(match).slice().sort(function(a,b){
      return (a[sb]||'').localeCompare(b[sb]||'','zh')|| a.id.localeCompare(b.id);
    });
    cnt.textContent=res.length;
    grid.innerHTML=res.length?res.map(LZ.objectCard).join(''):'<div class="empty">未找到符合条件的器物，请调整筛选条件。</div>';
    LZ.bindCards(grid);
  }
  document.getElementById('go').addEventListener('click',render);
  document.getElementById('q').addEventListener('keydown',function(e){if(e.key==='Enter')render();});
  document.getElementById('q').addEventListener('input',render);
  document.getElementById('sort').addEventListener('change',render);
  document.getElementById('reset').addEventListener('click',function(){
    sel={};FACETS.forEach(function(f){sel[f.key]={};});
    fc.querySelectorAll('.chip').forEach(function(c){c.classList.remove('on');});
    document.getElementById('q').value='';render();
  });
  render();
})();
</script>
</body>
</html>
